syntax = "proto3";

package pvault.v1;

option go_package = "github.com/pdaccess/pvault/pkg/api/v1;v1";

import "google/protobuf/timestamp.proto";

// Service definition for the Hardened Data Plane
service PVaultService {
  // --- Identity & Authentication ---
  // Unified Auth: Handles Local (Pass) and Brokered (LDAP/OAuth2 via JWKS)
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse);
  
  // User Lifecycle
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc ChangePassword(ChangePasswordRequest) returns (UserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (UserResponse);

  // Vault Management
  rpc CreateVault(CreateVaultRequest) returns (CreateVaultResponse);

  // Membership Management
  rpc CreateMembership(CreateMembershipRequest) returns (MembershipResponse);
  rpc ListAuthorizedVaults(ListVaultsRequest) returns (ListVaultsResponse);

  // Secret Management
  rpc ProtectSecret(ProtectSecretRequest) returns (SecretResponse);
  rpc UncoverSecret(UncoverSecretRequest) returns (UncoverSecretResponse);
  rpc UpdateSecretCapabilities(UpdateSecretCapabilitiesRequest) returns (SecretResponse);

  // Audit Logging
  rpc RecordAuditLog(AuditLogRequest) returns (AuditLogResponse);
  rpc GetAuditLogs(GetAuditLogsRequest) returns (GetAuditLogsResponse);
}

// --- Identity Messages ---

message AuthorizeRequest {
  oneof auth_type {
    LocalAuth local = 1;      // For Username/Password login
    BrokeredAuth brokered = 2; // For LDAP/OAuth2 via AuthWS signed token
  }
}

message LocalAuth {
  string username = 1;
  string password = 2;
}

message BrokeredAuth {
  string provider = 1;      // e.g., "ldap", "google"
  string external_id = 2;   // sAMAccountName or OIDC Sub
  string service_token = 3; // Signed JWT from AuthWS verified via JWKS
}

message AuthorizeResponse {
  string user_id = 1;
  string wrapped_user_root_key = 2; // Ku wrapped for the caller's memory space
  bool success = 3;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;   // Only for local provider
  string external_id = 3;  // For LDAP/OAuth mapping
  string provider = 4;   // 'local', 'ldap', 'google', 'service'
}

message CreateUserResponse {
  string user_id = 1;
  string wrapped_user_root_key = 2;
  bool success = 3;
}

message ChangePasswordRequest {
  string username = 1;
  string old_password = 2;
  string new_password = 3;
}

message DeleteUserRequest {
  string user_id = 1;
  string service_token = 2; // AuthWS must authorize the deletion
}

message UserResponse {
  bool success = 1;
  string message = 2;
}

// --- Vault Messages ---

message CreateVaultRequest {
  string vault_id = 1; // UUID - caller assigned
}

message CreateVaultResponse {
  string vault_id = 1;
  bool   success  = 2;
  string message  = 3;
}

// --- Membership Messages ---

message CreateMembershipRequest {
  string user_id = 1;      // UUID string
  string vault_id = 2;     // UUID string
  string role = 3;
}

message ListVaultsRequest {
  // Note: user_id is extracted from the JWT in the mTLS/Metadata layer
}

message ListVaultsResponse {
  repeated string vault_ids = 1;
}

message MembershipResponse {
  bool success = 1;
  string message = 2;
}

// --- Secret Messages ---

message ProtectSecretRequest {
  string secret_id = 1;
  string vault_id = 2;
  string plaintext = 3;
  repeated string capabilities = 4;
}

message SecretResponse {
  string secret_id = 1;
  bool success = 2;
  int32 version = 3;
}

message UncoverSecretRequest {
  string secret_id = 1;
  string action = 2; // e.g., "connect", "see"
  int32 version = 3; // optional version to uncover
}

message UncoverSecretResponse {
  string plaintext = 1;
  int32 version = 2;
}

message UpdateSecretCapabilitiesRequest {
  string secret_id = 1;
  string user_id = 2;
  repeated string capabilities = 3;
}

// --- Audit Messages ---

message AuditLogRequest {
  string source_service = 1;
  string correlation_id = 2;
  string event_type = 3;
  string actor_id = 4;
  string action_status = 5;
  string payload_json = 6; // Serialized JSON metadata
}

message AuditLogResponse {
  int64 audit_id = 1;
  bytes curr_hmac = 2; // For verification acknowledgment
}

message GetAuditLogsRequest {
  int32 start = 1;
  int32 limit = 2;
  string user_id = 3;
  string vault_id = 4;
}

message GetAuditLogsResponse {
  repeated AuditLogEntry entries = 1;
}

message AuditLogEntry {
  int64 id = 1;
  string source_service = 2;
  string correlation_id = 3;
  string event_type = 4;
  string actor_id = 5;
  string action_status = 6;
  string payload_json = 7;
  int64 updated_at = 8;
}