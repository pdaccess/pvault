version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: pvault-postgres
    environment:
      POSTGRES_DB: pvault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: pvault-keycloak
    command: start-dev --import-realm
    environment:
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/pvault
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
    ports:
      - "8180:8080"
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3; grep -q 'HTTP/1.1 200 OK' <&3"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure

  pvault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pvault-server
    ports:
      - "50051:50051"
    environment:
      PV_STORAGE_KEY: ${PV_STORAGE_KEY:-f25f22f2f3c69a388daca5f9741df530193ee89730c5aefa2f8261081e87521b}
      PV_LISTEN: ${PV_LISTEN:-:50051}
      PV_DB: ${PV_DB:-postgres://postgres:postgres@postgres:5432/pvault}
      PV_JWKS: ${PV_JWKS:-http://keycloak:8080/realms/pvault/protocol/openid-connect/certs}
      PV_JWKS_REFRESH: ${PV_JWKS_REFRESH:-5m}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy

volumes:
  postgres_data: